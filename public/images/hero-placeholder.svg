<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#15324D"/>
      <stop offset="100%" stop-color="#0B1B2B"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(200,162,75,0.08)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="640" height="800" fill="url(#bg)"/>
  <rect width="640" height="800" fill="url(#grid)"/>
  <g opacity="0.5">
    <rect x="80" y="400" width="80" height="350" fill="rgba(255,255,255,0.04)"/>
    <rect x="170" y="300" width="100" height="450" fill="rgba(255,255,255,0.05)"/>
    <rect x="280" y="200" width="120" height="550" fill="rgba(255,255,255,0.06)"/>
    <rect x="410" y="350" width="90" height="400" fill="rgba(255,255,255,0.04)"/>
    <rect x="510" y="280" width="80" height="470" fill="rgba(255,255,255,0.05)"/>
  </g>
  <text x="320" y="420" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#C8A24B" font-weight="600">Frankfurt Skyline</text>
  <text x="320" y="455" text-anchor="middle" font-family="sans-serif" font-size="14" fill="rgba(255,255,255,0.4)">Platzhalter — echtes Foto folgt</text>
</svg>
